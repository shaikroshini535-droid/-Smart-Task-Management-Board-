<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Management Board</title>
</head>
<body>

    <h1>Smart Task Management Board</h1>

    <div>
        <input type="text" placeholder="Enter Task">
        
        <select>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <button>Add Task</button>
    </div>

    <hr>

    <div>
        <h2>📝 To Do</h2>
    </div>

    <div>
        <h2>🔄 In Progress</h2>
    </div>

    <div>
        <h2>✅ Completed</h2>
    </div>

</body>
</html>
