<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Management Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Smart Task Management Board</h1>

    <div>
        <input
type="text"
id="taskInput"
placeholder="Enter Task">

<select id="priority">
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
</select>

<button id="addTaskBtn">
    Add Task
</button>

<div id="taskList"></div>
        
    </div>

    <hr>

    <div>
        <h2>📝 To Do</h2>
        <!--Task Cards Design-->
        <div class="task-card">
            <h3>Complete HTML Project</h3>
            <span class="priority high">High</span>
        </div>

        <div class="task-card">
            <h3>Learn JavaScript</h3>
            <span class="priority medium">Medium</span>
        </div>

        <div class="task-card">
            <h3>Read CSS Notes</h3>
            <span class="priority low">Low</span>
        </div>
    </div>

    <div>
        <h2>🔄 In Progress</h2>
    </div>

    <div>
        <h2>✅ Completed</h2>
    </div>

</body>
    <script src="script.js"></script>
</html>
