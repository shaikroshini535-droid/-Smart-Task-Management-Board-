<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Management Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Smart Task Management Board</h1>

    <div>
        <input type="text" id="taskInput" placeholder="Enter Task">

        <select id="priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <button id="addTaskBtn">Add Task</button>
    </div>

    <hr>

    <div style="display:flex; gap:20px;">

        <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>📝 To Do</h2>
        </div>

        <div class="column" id="progress" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>🔄 In Progress</h2>
        </div>

        <div class="column" id="completed" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>✅ Completed</h2>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
